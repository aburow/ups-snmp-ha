---
minimum_pre_commit_version: "3.5.0"

exclude: >-
  (?x)^(
    \.cache/|
    \.pytest_cache/|
    \.ruff_cache/|
    \.venv/|
    node_modules/|
    logs/|
    localonly/|
    __pycache__/|
    .*\.log$
  )

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff
        entry: scripts/run_uv_tool.sh ruff check
        language: system
      - id: ruff-format
        entry: scripts/run_uv_tool.sh ruff format
        language: system

  - repo: local
    hooks:
      - id: grain-lint
        name: grain check
        entry: scripts/run_uv_tool.sh grain check
        language: system
        types: [python]

      - id: yamllint
        name: yamllint
        entry: scripts/run_uv_tool.sh yamllint -s -c .yamllint
        language: system
        files: \.(yaml|yml)$
        stages: [manual]

      - id: shellcheck
        name: shellcheck
        entry: shellcheck
        language: system
        types: [shell]
        stages: [manual]

      - id: shfmt
        name: shfmt
        entry: shfmt -w -i 2 -ci
        language: system
        types: [shell]
        stages: [manual]

      - id: sqlfluff-lint
        name: sqlfluff lint
        entry: scripts/run_uv_tool.sh sqlfluff lint
        language: system
        files: \.sql$
        stages: [manual]

      - id: semgrep
        name: semgrep
        entry: scripts/run_semgrep.sh
        language: system
        pass_filenames: false
        stages: [manual]

      - id: codeql
        name: codeql security scan
        entry: scripts/run_codeql.sh
        language: system
        pass_filenames: false
        stages: [manual]
